<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry My Girl ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation: gradient 10s ease infinite;
overflow:hidden;
color:white;
text-align:center;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background: rgba(255,255,255,0.15);
padding:50px;
border-radius:25px;
backdrop-filter: blur(15px);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
max-width:500px;
animation: fade 2s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:40px;
margin-bottom:10px;
}

#typing{
font-size:18px;
min-height:70px;
margin-top:20px;
}

button{
margin:15px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

.yes{
background:white;
color:#ff4f7b;
}

.no{
background:#ff4f7b;
color:white;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-100vh); opacity:0;}
}

#celebration{
display:none;
font-size:30px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>I'm Sorry ❤️</h1>

<div id="typing"></div>

<div id="buttons">
<button class="yes" onclick="forgive()">Yes, I Love You 💖</button>
<button class="no" onclick="moveButton(this)">No 😜</button>
</div>

<div id="celebration">
</div>

</div>

<script>

/* typing animation */

const text="I know I made a mistake (Ida yalla Halada Niddeyinda) and I truly regret it. You mean the world to me. Please forgive me, LOVE YOU Machaa ❤️";
const sorry="Thank you for forgiving me 💖✨,  I Won't do same mistake again🌹";

let i=0;
let j=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

/* floating hearts */

function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
h.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(h);

setTimeout(()=>{h.remove()},6000);
}

setInterval(heart,400);

/* forgive button */

function forgive(){
//document.getElementById("buttons").style.display="none";
//document.getElementById("celebration").style.display="block";
  if(j<sorry.length){
document.getElementById("celebration").innerHTML+=sorry.charAt(j);
j++;
setTimeout(forgive,40);

}

}

/* funny no button */

function moveButton(btn){
btn.style.position="absolute";
btn.style.top=Math.random()*100+"%";
btn.style.left=Math.random()*100+"%";
}

</script>

</body>
</html>
